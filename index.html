<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apontamento de Produção</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Apontamento de Produção</h2>

<div class="card">

<label>Operador:</label>
<input type="text" id="operador">

<label>Linha:</label>
<input type="text" id="linha" readonly>

<label>OP:</label>
<input type="text" id="op">

<br><br>

<button onclick="iniciarOP()">Iniciar OP</button>
<button onclick="finalizarOP()">Finalizar OP</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDJBQjFfmh_7SMtcl7AILrWqdKZOKo7y38",
  authDomain: "apontamento-producao-f29f4.firebaseapp.com",
  projectId: "apontamento-producao-f29f4",
  storageBucket: "apontamento-producao-f29f4.firebasestorage.app",
  messagingSenderId: "431358877642",
  appId: "1:431358877642:web:66b9bd1b3c2d8bb3457933"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
// PREENCHER LINHA VIA QR (?linha=A)
const params = new URLSearchParams(window.location.search);
document.getElementById("linha").value = params.get("linha") || "";

// VARIÁVEL GLOBAL PARA INÍCIO
let inicioOP = null;

// INICIAR OP
function iniciarOP() {

inicioOP = new Date();

alert("OP iniciada às " + inicioOP.toLocaleTimeString());

}

// FINALIZAR OP
function finalizarOP() {

if (!inicioOP) {
alert("Você precisa iniciar a OP primeiro!");
return;
}

const fimOP = new Date();
const tempoMinutos = Math.round((fimOP - inicioOP) / 60000);

const data = {
  operador: document.getElementById("operador").value,
  linha: document.getElementById("linha").value,
  op: document.getElementById("op").value,
  inicio: inicioOP.toISOString(),
  fim: fimOP.toISOString(),
  tempo_minutos: tempoMinutos
};

db.collection("apontamentos").add(data)
.then(() => {
  alert("OP finalizada! Tempo total: " + tempoMinutos + " minutos");

  // reset
  inicioOP = null;
  document.getElementById("op").value = "";
})
.catch((error) => {
  alert("Erro ao salvar: " + error);
});

}
</script>

</body>
</html>
