<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apontamento de Produção</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Apontamento de Produção</h2>

<div class="card">

<label>Operador:</label>
<input type="text" id="operador">

<label>Linha:</label>
<input type="text" id="linha" readonly>

<label>OP:</label>
<input type="text" id="op">

<label>Tipo de atividade:</label>
<select id="tipo">
  <option value="inicio">Início</option>
  <option value="fim">Finalização</option>
</select>

<label>Ocorrências:</label>
<textarea id="ocorrencias"></textarea>

<label>Observações:</label>
<textarea id="observacoes"></textarea>

<button onclick="salvar()">Enviar</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDJBQjFfmh_7SMtcl7AILrWqdKZOKo7y38",
  authDomain: "apontamento-producao-f29f4.firebaseapp.com",
  projectId: "apontamento-producao-f29f4",
  storageBucket: "apontamento-producao-f29f4.firebasestorage.app",
  messagingSenderId: "431358877642",
  appId: "1:431358877642:web:66b9bd1b3c2d8bb3457933"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
// PREENCHE LINHA VIA QR CODE (?linha=A)
const params = new URLSearchParams(window.location.search);
const linha = params.get("linha");

if (linha) {
  document.getElementById("linha").value = linha;
}
</script>

<script>
// FUNÇÃO SALVAR NO FIREBASE
function salvar() {

const data = {
  operador: document.getElementById("operador").value,
  linha: document.getElementById("linha").value,
  op: document.getElementById("op").value,
  tipo: document.getElementById("tipo").value,
  ocorrencias: document.getElementById("ocorrencias").value,
  observacoes: document.getElementById("observacoes").value,
  hora: new Date().toISOString()
};

db.collection("apontamentos").add(data)
.then(() => {
  alert("Apontamento salvo com sucesso!");

  // limpa campos
  document.getElementById("op").value = "";
  document.getElementById("ocorrencias").value = "";
  document.getElementById("observacoes").value = "";
})
.catch((error) => {
  alert("Erro ao salvar: " + error);
});

}
</script>

</body>
</html>
